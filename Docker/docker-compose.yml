version: '3.8'

services:
  # 我们的 NestJS 后端服务
  api-gateway:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:123456@postgres:5432/common_db
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  # 数据库服务
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: common_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 缓存服务
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
